<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>biubiu 冠军专线 · 付款成功仪式原型</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cinzel:wght@400;700;900&family=Ma+Shan+Zheng&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#d4ba87;--gold-light:#e8d5b0;--gold-dark:#a08555;--gold-dim:rgba(212,186,135,0.35);
  --fps-p:#e87a2e;--fps-s:#2d5a3a;--fps-a:#c4f04e;
  --ftg-p:#4a7dff;--ftg-s:#ff3366;--ftg-a:#c850ff;
  --mmo-p:#d4ba87;--mmo-s:#3a7bd5;--mmo-a:#e8e0ff;
}
body{background:#060504;color:#fff;font-family:'Cinzel','Georgia',serif;overflow:hidden}
.stage{width:100vw;height:100vh;position:relative;overflow:hidden;background:radial-gradient(ellipse at 50% 50%,#100e0a 0%,#0a0806 40%,#060504 70%,#030202 100%)}
canvas#particleCanvas{position:absolute;inset:0;z-index:1;pointer-events:none}
.act{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.8s ease;z-index:2}
.act.active{opacity:1;pointer-events:auto}

/* SELECTOR */
.selector-wrap{text-align:center;z-index:5}
.selector-title{font-size:13px;letter-spacing:12px;text-transform:uppercase;color:rgba(212,186,135,0.3);margin-bottom:48px;font-family:system-ui;font-weight:300}
.selector-subtitle{font-size:30px;color:var(--gold);margin-bottom:16px;font-weight:700;letter-spacing:6px}
.selector-desc{font-size:14px;color:rgba(212,186,135,0.3);font-family:system-ui;font-weight:300;letter-spacing:3px;margin-bottom:56px}
.type-cards{display:flex;gap:36px;justify-content:center}
.type-card{width:200px;padding:44px 24px;border:1px solid rgba(212,186,135,0.12);background:linear-gradient(180deg,rgba(212,186,135,0.03),rgba(212,186,135,0.01));cursor:pointer;transition:all 0.5s cubic-bezier(0.25,0.46,0.45,0.94);display:flex;flex-direction:column;align-items:center;gap:16px;position:relative}
.type-card::before{content:'';position:absolute;inset:6px;border:1px solid rgba(212,186,135,0.05);pointer-events:none;transition:border-color 0.5s}
.type-card::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 80%,rgba(212,186,135,0.06),transparent 60%);opacity:0;transition:opacity 0.5s;pointer-events:none}
.type-card:hover{border-color:rgba(212,186,135,0.35);background:linear-gradient(180deg,rgba(212,186,135,0.06),rgba(212,186,135,0.02));transform:translateY(-8px);box-shadow:0 20px 50px rgba(0,0,0,0.4),0 0 30px rgba(212,186,135,0.08)}
.type-card:hover::before{border-color:rgba(212,186,135,0.1)}
.type-card:hover::after{opacity:1}
.type-card .icon{font-size:48px;opacity:0.5;color:var(--gold)}
.type-card .label{font-size:16px;letter-spacing:6px;color:rgba(212,186,135,0.6);font-family:system-ui}
.type-card .desc{font-size:12px;color:rgba(212,186,135,0.2);font-family:system-ui;line-height:1.7;letter-spacing:1px}

/* ACT 1 */
#act1 .center-glow{width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(212,186,135,0.18) 0%,rgba(212,186,135,0.06) 40%,transparent 70%);animation:pulse-glow 2.5s ease-in-out infinite;box-shadow:0 0 80px rgba(212,186,135,0.08),0 0 160px rgba(212,186,135,0.04)}
@keyframes pulse-glow{0%,100%{transform:scale(0.8);opacity:0.3}50%{transform:scale(1.5);opacity:0.9}}
#act1 .hint-text{position:absolute;bottom:15vh;font-size:14px;letter-spacing:8px;color:rgba(212,186,135,0.25);font-family:system-ui;font-weight:300;animation:fade-hint 2s ease-in-out infinite}
@keyframes fade-hint{0%,100%{opacity:0.2}50%{opacity:0.6}}

/* ACT 2 */
#act2{z-index:3}
#act2 .genre-stage{position:absolute;inset:0;overflow:hidden}
.video-bg{position:absolute;inset:0;opacity:0.3;z-index:0}
.video-scene{position:absolute;inset:0;opacity:0;transition:opacity 0.6s}
.video-scene.active{opacity:1}

/* FPS SNIPER SCOPE */
.scope-wrap{position:absolute;z-index:5;display:flex;align-items:center;justify-content:center;top:0;left:0;width:100%;height:100%}
.scope-vessel{width:min(75vw,75vh);height:min(75vw,75vh);border-radius:50%;position:relative;overflow:hidden;border:4px solid rgba(255,255,255,0.12);box-shadow:0 0 60px rgba(0,0,0,0.8),inset 0 0 80px rgba(0,0,0,0.5);background:#0a0a0a}
.scope-wrap.aiming{animation:scope-aim 5s ease-in-out forwards}
@keyframes scope-aim{
  0%{transform:translate(0,0) scale(1)}
  12%{transform:translate(-18vw,8vh) scale(1)}
  22%{transform:translate(-18vw,8vh) scale(1.05)}
  35%{transform:translate(15vw,-12vh) scale(1)}
  48%{transform:translate(8vw,15vh) scale(1)}
  58%{transform:translate(8vw,15vh) scale(1.05)}
  70%{transform:translate(-5vw,-5vh) scale(1)}
  82%{transform:translate(0,0) scale(1)}
  100%{transform:translate(0,0) scale(1.8)}
}
.scope-vessel.zoom-full{width:160vmax;height:160vmax;border-radius:0;border-color:transparent;transition:all 0.6s cubic-bezier(0.4,0,0.2,1)}
.scope-crosshair-h{position:absolute;top:50%;left:0;width:100%;height:1px;background:rgba(255,255,255,0.25);z-index:3}
.scope-crosshair-v{position:absolute;left:50%;top:0;width:1px;height:100%;background:rgba(255,255,255,0.25);z-index:3}
.scope-center-dot{position:absolute;top:50%;left:50%;width:4px;height:4px;background:rgba(255,50,50,0.9);border-radius:50%;transform:translate(-50%,-50%);z-index:4}
.scope-mil{position:absolute;font-family:'Orbitron',monospace;font-size:10px;color:rgba(255,255,255,0.3);z-index:3}
.scope-mil.top{top:18%;left:50%;transform:translateX(-50%)}
.scope-mil.bottom{bottom:18%;left:50%;transform:translateX(-50%)}
.scope-mil.left{left:15%;top:50%;transform:translateY(-50%)}
.scope-mil.right{right:15%;top:50%;transform:translateY(-50%)}
.scope-range{position:absolute;bottom:12%;right:10%;font-family:'Orbitron',monospace;font-size:11px;color:rgba(196,240,78,0.6);z-index:3;letter-spacing:2px}
.scope-tick{position:absolute;background:rgba(255,255,255,0.12);z-index:2}
.scope-tick.h{width:12px;height:1px}
.scope-tick.v{width:1px;height:12px}
.scope-vignette{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle,transparent 40%,rgba(0,0,0,0.7) 85%,rgba(0,0,0,0.95) 100%);z-index:5}
.scope-scanline{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,255,255,0.015) 3px,rgba(255,255,255,0.015) 4px);z-index:6;border-radius:50%}
.muzzle-flash{position:absolute;z-index:8;pointer-events:none;width:60px;height:60px;border-radius:50%;background:radial-gradient(circle,rgba(255,200,50,0.9),rgba(255,120,20,0.5),transparent);opacity:0}
.muzzle-flash.fire{animation:mflash 0.12s ease-out forwards}
@keyframes mflash{0%{opacity:1;transform:scale(0.5)}50%{opacity:0.8;transform:scale(1.2)}100%{opacity:0;transform:scale(1.5)}}
.tracer{position:absolute;z-index:7;pointer-events:none;height:2px;background:linear-gradient(90deg,rgba(255,200,50,0.8),rgba(255,200,50,0),transparent);opacity:0}
.tracer.fire{animation:tracer-fly 0.3s ease-out forwards}
@keyframes tracer-fly{0%{opacity:0.9;transform:scaleX(0.3)}100%{opacity:0;transform:scaleX(3)}}
.hit-marker{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;opacity:0;pointer-events:none}
.hit-marker.show{animation:hitmark 0.4s ease-out forwards}
@keyframes hitmark{0%{opacity:1;transform:translate(-50%,-50%) scale(0.5)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.5)}}
.hit-marker .hm-line{position:absolute;background:rgba(255,255,255,0.9);width:18px;height:2px}
.hit-marker .hm-line:nth-child(1){transform:rotate(45deg) translate(8px,0)}
.hit-marker .hm-line:nth-child(2){transform:rotate(-45deg) translate(8px,0)}
.hit-marker .hm-line:nth-child(3){transform:rotate(135deg) translate(8px,0)}
.hit-marker .hm-line:nth-child(4){transform:rotate(-135deg) translate(8px,0)}

/* FPS HUD */
.fps-scanlines{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(232,122,46,0.03) 3px,rgba(232,122,46,0.03) 4px);pointer-events:none;z-index:5}
.fps-hud-item{position:absolute;font-family:'Orbitron',monospace;font-size:16px;color:rgba(232,122,46,0.7);letter-spacing:3px;z-index:4}
.fps-flash{position:absolute;inset:0;background:#fff;opacity:0;z-index:10}

/* FTG */
.ftg-split{position:absolute;inset:0;display:flex}
.ftg-half{flex:1;position:relative;overflow:hidden}
.ftg-half.left{background:linear-gradient(135deg,rgba(74,125,255,0.18),rgba(74,125,255,0.04))}
.ftg-half.right{background:linear-gradient(225deg,rgba(255,51,102,0.18),rgba(255,51,102,0.04))}
.ftg-vs{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',monospace;font-size:120px;font-weight:900;color:#fff;text-shadow:0 0 40px rgba(200,80,255,0.6);z-index:4}
.ftg-combo{position:absolute;right:40px;top:50%;transform:translateY(-50%);font-family:'Orbitron',monospace;text-align:right;z-index:4}
.ftg-combo .num{font-size:72px;font-weight:900;color:var(--ftg-a)}
.ftg-combo .label{font-size:16px;color:rgba(255,255,255,0.5);letter-spacing:6px}
.ftg-energy-bar{position:absolute;bottom:80px;height:10px;z-index:4;background:rgba(255,255,255,0.1)}
.ftg-energy-bar.left{left:30px;right:52%}
.ftg-energy-bar.right{left:52%;right:30px}
.ftg-energy-fill{height:100%;width:0%;transition:width 1.5s ease-out}
.ftg-energy-bar.left .ftg-energy-fill{background:var(--ftg-p)}
.ftg-energy-bar.right .ftg-energy-fill{background:var(--ftg-s)}
.shockwave{position:absolute;top:50%;width:60px;height:60px;border-radius:50%;transform:translateY(-50%) scale(0);z-index:5;pointer-events:none}
.shockwave.blue{left:0;background:radial-gradient(circle,rgba(74,125,255,0.6),rgba(74,125,255,0.1),transparent);border:3px solid rgba(74,125,255,0.8)}
.shockwave.red{right:0;background:radial-gradient(circle,rgba(255,51,102,0.6),rgba(255,51,102,0.1),transparent);border:3px solid rgba(255,51,102,0.8)}
.shockwave.fire{animation:shock-expand 1.4s cubic-bezier(0.22,0.61,0.36,1) forwards}
@keyframes shock-expand{0%{transform:translateY(-50%) scale(0);opacity:1}60%{opacity:0.8}100%{transform:translateY(-50%) scale(25);opacity:0}}
.brush-ko{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-family:'Ma Shan Zheng',cursive;font-size:min(260px,22vw);color:#fff;letter-spacing:32px;z-index:999;opacity:0;text-shadow:0 0 80px rgba(255,51,102,0.7),0 0 160px rgba(255,51,102,0.4),0 0 80px rgba(74,125,255,0.5),0 0 160px rgba(74,125,255,0.3),0 6px 30px rgba(0,0,0,0.8)}
.brush-ko.slam{animation:ko-slam 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards}
@keyframes ko-slam{0%{transform:translate(-50%,-50%) scale(4) rotate(-8deg);opacity:0}40%{transform:translate(-50%,-50%) scale(0.9) rotate(2deg);opacity:1}60%{transform:translate(-50%,-50%) scale(1.05) rotate(-1deg);opacity:1}100%{transform:translate(-50%,-50%) scale(1) rotate(0deg);opacity:1}}

/* MMO - Galaxy & Holy Sword */
.mmo-starfield{position:absolute;inset:0;z-index:0}
.mmo-star{position:absolute;border-radius:50%;background:#fff}
.mmo-nebula{position:absolute;inset:0;z-index:1;opacity:0;transition:opacity 1.5s}
.mmo-galaxy-stream{position:absolute;top:50%;left:50%;width:120vmax;height:2px;transform-origin:center center;z-index:1;opacity:0;transition:opacity 1s}
.mmo-rune-circle{position:absolute;top:50%;left:50%;border-radius:50%;z-index:3;opacity:0;transition:opacity 0.8s}
.mmo-rune-circle.c1{width:460px;height:460px;transform:translate(-50%,-50%);border:2px solid rgba(212,186,135,0.3);box-shadow:0 0 35px rgba(212,186,135,0.18),0 0 70px rgba(212,186,135,0.06),inset 0 0 35px rgba(212,186,135,0.08);animation:rune-cw 14s linear infinite;border-style:dashed}
.mmo-rune-circle.c1::after{content:'';position:absolute;inset:16px;border-radius:50%;border:1px solid rgba(212,186,135,0.12)}
.mmo-rune-circle.c1::before{content:'';position:absolute;inset:-6px;border-radius:50%;border:1px solid rgba(212,186,135,0.08)}
.mmo-rune-circle.c2{width:330px;height:330px;transform:translate(-50%,-50%);border:2px dashed rgba(212,186,135,0.4);box-shadow:0 0 28px rgba(212,186,135,0.15),inset 0 0 28px rgba(212,186,135,0.07);animation:rune-ccw 10s linear infinite}
.mmo-rune-circle.c2::after{content:'';position:absolute;inset:14px;border-radius:50%;border:1px solid rgba(212,186,135,0.15)}
.mmo-rune-circle.c2::before{content:'';position:absolute;inset:-4px;border-radius:50%;border:1px solid rgba(212,186,135,0.06)}
.mmo-rune-circle.c3{width:200px;height:200px;transform:translate(-50%,-50%);border:2px dashed rgba(212,186,135,0.55);box-shadow:0 0 40px rgba(212,186,135,0.22),0 0 80px rgba(212,186,135,0.08),inset 0 0 40px rgba(212,186,135,0.12);animation:rune-cw 7s linear infinite}
.mmo-rune-circle.c3::after{content:'';position:absolute;inset:10px;border-radius:50%;border:1px solid rgba(212,186,135,0.22)}
.mmo-rune-circle.c3::before{content:'';position:absolute;inset:-5px;border-radius:50%;border:1px solid rgba(212,186,135,0.1)}
@keyframes rune-cw{to{transform:translate(-50%,-50%) rotate(360deg)}}
@keyframes rune-ccw{to{transform:translate(-50%,-50%) rotate(-360deg)}}
.mmo-rune-tick{position:absolute;background:rgba(212,186,135,0.4);z-index:3;pointer-events:none}
.mmo-rune-glyph{position:absolute;font-size:18px;color:rgba(212,186,135,0.5);font-family:'Cinzel',serif;z-index:4;text-shadow:0 0 10px rgba(212,186,135,0.3);animation:rune-glyph-glow 3s ease-in-out infinite}
@keyframes rune-glyph-glow{0%,100%{text-shadow:0 0 10px rgba(212,186,135,0.2);opacity:0.6}50%{text-shadow:0 0 22px rgba(212,186,135,0.6),0 0 40px rgba(212,186,135,0.2);opacity:1}}
.mmo-sword{position:absolute;top:50%;left:50%;z-index:6;opacity:0;transform:translate(-50%,-200vh);transform-style:preserve-3d;perspective:800px}
.mmo-sword.dropping{animation:sword-drop-3d 0.9s cubic-bezier(0.55,0,0.85,0.4) forwards}
@keyframes sword-drop-3d{
  0%{opacity:1;transform:translate(-50%,-200vh) rotateX(25deg) rotateY(-15deg)}
  65%{opacity:1;transform:translate(-50%,-55%) rotateX(8deg) rotateY(-3deg)}
  88%{opacity:1;transform:translate(-50%,-50%) rotateX(-3deg) rotateY(1deg)}
  100%{opacity:1;transform:translate(-50%,-50%) rotateX(0) rotateY(0)}
}
@keyframes sword-drop-left{
  0%{opacity:1;transform:translate(calc(-50% - 100px),-200vh) rotateX(25deg) rotateY(-15deg) rotate(-18deg)}
  65%{opacity:1;transform:translate(calc(-50% - 100px),-55%) rotateX(8deg) rotateY(-3deg) rotate(-18deg)}
  88%{opacity:1;transform:translate(calc(-50% - 100px),-50%) rotateX(-3deg) rotateY(1deg) rotate(-18deg)}
  100%{opacity:1;transform:translate(calc(-50% - 100px),-50%) rotateX(0) rotateY(0) rotate(-18deg)}
}
@keyframes sword-drop-right{
  0%{opacity:1;transform:translate(calc(-50% + 100px),-200vh) rotateX(25deg) rotateY(-15deg) rotate(18deg)}
  65%{opacity:1;transform:translate(calc(-50% + 100px),-55%) rotateX(8deg) rotateY(-3deg) rotate(18deg)}
  88%{opacity:1;transform:translate(calc(-50% + 100px),-50%) rotateX(-3deg) rotateY(1deg) rotate(18deg)}
  100%{opacity:1;transform:translate(calc(-50% + 100px),-50%) rotateX(0) rotateY(0) rotate(18deg)}
}
.mmo-sword .sw-inner{position:relative;transform-style:preserve-3d;transform:rotateY(-15deg) rotateX(5deg)}
.mmo-sword .blade-3d{position:relative;width:16px;height:210px;transform-style:preserve-3d;margin:0 auto}
.mmo-sword .bf{position:absolute;backface-visibility:hidden}
.mmo-sword .bf.front{inset:0;background:linear-gradient(180deg,rgba(255,255,255,0.98) 0%,#fff 4%,#f8f0dc 10%,var(--gold) 30%,var(--gold-dark) 60%,#7a6338 85%,#5a4525 100%);transform:translateZ(4px);box-shadow:0 0 28px rgba(212,186,135,0.5),0 0 60px rgba(212,186,135,0.18)}
.mmo-sword .bf.front::after{content:'';position:absolute;top:5%;left:38%;width:3px;height:80%;background:linear-gradient(180deg,rgba(255,255,255,0.9),rgba(255,255,255,0.4) 50%,rgba(255,255,255,0.05));box-shadow:0 0 8px rgba(255,255,255,0.35),0 0 16px rgba(255,255,255,0.1)}
.mmo-sword .bf.front::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,rgba(255,255,255,0.15) 0%,transparent 30%,transparent 70%,rgba(255,255,255,0.08) 100%)}
.mmo-sword .bf.back{inset:0;background:linear-gradient(180deg,rgba(220,210,190,0.9) 0%,var(--gold-dark) 40%,#6b5530 75%,#4a3a20 100%);transform:rotateY(180deg) translateZ(4px)}
.mmo-sword .bf.left-e{position:absolute;left:0;top:0;width:8px;height:100%;background:linear-gradient(180deg,#f5e6c4,var(--gold),var(--gold-dark),#5a4525);transform:rotateY(-90deg) translateZ(0px);transform-origin:left center}
.mmo-sword .bf.right-e{position:absolute;right:0;top:0;width:8px;height:100%;background:linear-gradient(180deg,#f5e6c4,var(--gold),var(--gold-dark),#5a4525);transform:rotateY(90deg) translateZ(0px);transform-origin:right center}
.mmo-sword .bf.tip-f{position:absolute;bottom:-40px;left:50%;width:16px;height:40px;transform:translateX(-50%) translateZ(4px);background:linear-gradient(180deg,var(--gold-dark) 0%,rgba(212,186,135,0.5) 60%,rgba(212,186,135,0.15) 100%);clip-path:polygon(15% 0,85% 0,50% 100%)}
.mmo-sword .bf.tip-b{position:absolute;bottom:-40px;left:50%;width:16px;height:40px;transform:translateX(-50%) rotateY(180deg) translateZ(4px);background:linear-gradient(180deg,#6b5530 0%,rgba(90,69,37,0.4) 100%);clip-path:polygon(15% 0,85% 0,50% 100%)}
.mmo-sword .guard-3d{position:relative;width:72px;height:12px;margin:-2px auto 0;transform-style:preserve-3d}
.mmo-sword .gf{position:absolute;inset:0;border-radius:2px}
.mmo-sword .gf.front{background:linear-gradient(90deg,rgba(160,133,85,0.4),var(--gold-light) 20%,var(--gold) 50%,var(--gold-light) 80%,rgba(160,133,85,0.4));transform:translateZ(5px);box-shadow:0 0 20px rgba(212,186,135,0.5),0 0 40px rgba(212,186,135,0.15)}
.mmo-sword .gf.back{background:linear-gradient(90deg,#5a4525,var(--gold-dark),#5a4525);transform:rotateY(180deg) translateZ(5px)}
.mmo-sword .gf.top-e{position:absolute;top:0;left:0;width:100%;height:10px;background:linear-gradient(90deg,rgba(160,133,85,0.3),var(--gold-light),rgba(160,133,85,0.3));transform:rotateX(90deg) translateZ(5px);transform-origin:top center}
.mmo-sword .gf.bot-e{position:absolute;bottom:0;left:0;width:100%;height:10px;background:linear-gradient(90deg,#4a3a20,var(--gold-dark),#4a3a20);transform:rotateX(-90deg) translateZ(5px);transform-origin:bottom center}
.mmo-sword .gem{position:absolute;top:50%;left:50%;width:10px;height:10px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#fff,#ff9040,#e87a2e,#8b2500);transform:translate(-50%,-50%) translateZ(7px);box-shadow:0 0 14px rgba(232,122,46,0.8),0 0 30px rgba(232,122,46,0.4),0 0 50px rgba(232,122,46,0.15)}
.mmo-sword .grip-3d{width:8px;height:28px;margin:0 auto;position:relative;background:linear-gradient(90deg,#5a4525,#8b7355 40%,#5a4525);border-radius:1px}
.mmo-sword .grip-3d::before,.mmo-sword .grip-3d::after{content:'';position:absolute;left:-1px;right:-1px;height:3px;background:var(--gold-dark);border-radius:1px}
.mmo-sword .grip-3d::before{top:4px}.mmo-sword .grip-3d::after{bottom:4px}
.mmo-sword .pommel-3d{width:22px;height:22px;border-radius:50%;margin:0 auto;background:radial-gradient(circle at 30% 30%,var(--gold-light),var(--gold),var(--gold-dark));box-shadow:0 0 22px rgba(212,186,135,0.6),0 0 44px rgba(212,186,135,0.2),inset 0 -2px 4px rgba(0,0,0,0.3)}
.mmo-sword .sword-aura{position:absolute;top:-40px;left:50%;width:100px;height:300px;transform:translateX(-50%);background:radial-gradient(ellipse at 50% 35%,rgba(212,186,135,0.2),rgba(212,186,135,0.06) 40%,transparent 70%);pointer-events:none;animation:aura-pulse 2s ease-in-out infinite}
@keyframes aura-pulse{0%,100%{opacity:0.5;transform:translateX(-50%) scaleY(1)}50%{opacity:1;transform:translateX(-50%) scaleY(1.08)}}
.mmo-impact{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:7;pointer-events:none;opacity:0}
.mmo-impact.fire{animation:sword-impact 0.6s ease-out forwards}
@keyframes sword-impact{0%{opacity:1;transform:translate(-50%,-50%) scale(0.2)}40%{opacity:1;transform:translate(-50%,-50%) scale(1.8)}100%{opacity:0;transform:translate(-50%,-50%) scale(4)}}
.mmo-crack{position:absolute;top:50%;left:50%;z-index:5;opacity:0;pointer-events:none}
.mmo-crack-line{position:absolute;height:2px;background:linear-gradient(90deg,var(--gold),rgba(212,186,135,0.3),transparent);transform-origin:left center}
.mmo-shard{position:absolute;z-index:5;pointer-events:none;opacity:1;transition:all 1.2s cubic-bezier(0.25,0.46,0.45,0.94)}

/* KILL FREEZE */
.kill-freeze{position:absolute;inset:0;z-index:8;opacity:0;pointer-events:none;display:flex;align-items:center;justify-content:center;flex-direction:column}
.kill-freeze.active{opacity:1}
.kill-freeze .kf-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.55)}
.kill-freeze .kf-scanline{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(212,186,135,0.03) 2px,rgba(212,186,135,0.03) 4px);z-index:1}
.kill-freeze .kf-vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 35%,rgba(0,0,0,0.65) 100%);z-index:1}
.kill-freeze .kf-text{font-family:'Orbitron',monospace;font-size:min(64px,5.5vw);font-weight:900;letter-spacing:12px;color:#fff;z-index:2;text-shadow:0 0 40px rgba(212,186,135,0.4),0 0 80px rgba(212,186,135,0.15)}
.kill-freeze .kf-sub{font-family:'Orbitron',monospace;font-size:18px;letter-spacing:8px;color:rgba(212,186,135,0.5);z-index:2;margin-top:16px}

/* SCREEN FX */
.screen-shake{animation:shake 0.4s ease-out}
@keyframes shake{0%,100%{transform:translate(0,0)}10%{transform:translate(-8px,6px)}20%{transform:translate(6px,-8px)}30%{transform:translate(-6px,4px)}40%{transform:translate(4px,-6px)}50%{transform:translate(-4px,2px)}60%{transform:translate(2px,-4px)}70%{transform:translate(-2px,2px)}80%{transform:translate(2px,-2px)}90%{transform:translate(-1px,1px)}}
.screen-shake-heavy{animation:shake-heavy 0.6s ease-out}
@keyframes shake-heavy{0%,100%{transform:translate(0,0)}10%{transform:translate(-12px,10px)}20%{transform:translate(10px,-12px)}30%{transform:translate(-10px,8px)}40%{transform:translate(8px,-10px)}50%{transform:translate(-6px,4px)}60%{transform:translate(4px,-6px)}70%{transform:translate(-3px,3px)}80%{transform:translate(3px,-3px)}90%{transform:translate(-1px,1px)}}
.chromatic-flash{position:absolute;inset:0;z-index:20;pointer-events:none;opacity:0}
.chromatic-flash.fire{animation:chrom-flash 0.5s ease-out forwards}
@keyframes chrom-flash{0%{opacity:0.8;background:rgba(255,255,255,0.9)}20%{opacity:0.6}100%{opacity:0}}
.red-blue-flash{position:absolute;inset:0;z-index:20;pointer-events:none;opacity:0}
.red-blue-flash.fire{animation:rb-flash 0.8s ease-out forwards}
@keyframes rb-flash{0%{opacity:0;background:linear-gradient(90deg,rgba(74,125,255,0.5),rgba(255,255,255,0.8),rgba(255,51,102,0.5))}15%{opacity:1}100%{opacity:0}}
.lens-flare{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(212,186,135,0.25) 0%,rgba(212,186,135,0.08) 30%,transparent 60%);z-index:19;pointer-events:none;opacity:0}
.lens-flare.fire{animation:flare 0.8s ease-out forwards}
@keyframes flare{0%{opacity:1;transform:translate(-50%,-50%) scale(0.3)}30%{opacity:0.85;transform:translate(-50%,-50%) scale(1.6)}100%{opacity:0;transform:translate(-50%,-50%) scale(3.5)}}
.vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 45%,rgba(0,0,0,0.35) 75%,rgba(0,0,0,0.6) 100%);z-index:7;pointer-events:none}

/* LETTER */
#letterScene{z-index:30}
.letter-card{max-width:680px;width:80vw;padding:64px 56px;position:relative;z-index:31;border:1px solid rgba(212,186,135,0.22);background:rgba(12,10,8,0.98);margin:0 auto;box-shadow:0 30px 80px rgba(0,0,0,0.5),0 0 1px rgba(212,186,135,0.3)}
.letter-card::before{content:'';position:absolute;inset:10px;border:1px solid rgba(212,186,135,0.1)}
.letter-card::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 20%,rgba(212,186,135,0.05),transparent 60%);pointer-events:none}

/* Seat lock embedded in letter card */
.letter-seat-lock{text-align:center;padding-bottom:24px;margin-bottom:28px;border-bottom:1px solid rgba(212,186,135,0.08);opacity:0;transform:scale(2.5) translateY(-30px)}
.letter-seat-lock.landing{animation:seat-land 1s cubic-bezier(0.34,1.56,0.64,1) forwards}
@keyframes seat-land{0%{opacity:0;transform:scale(2.5) translateY(-30px)}30%{opacity:1;transform:scale(1.3) translateY(-8px)}55%{transform:scale(0.92) translateY(3px)}75%{transform:scale(1.03) translateY(-1px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.letter-seat-lock .lsl-label{font-size:13px;color:rgba(255,255,255,0.5);letter-spacing:6px;font-family:system-ui;font-weight:300;margin-bottom:6px}
.letter-seat-lock .lsl-number{font-family:'Orbitron',monospace;font-size:24px;font-weight:700;letter-spacing:6px;display:inline-block;background:linear-gradient(90deg,var(--gold) 0%,var(--gold) 40%,#fff 50%,var(--gold) 60%,var(--gold) 100%);background-size:250% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gold-shimmer 2.5s ease-in-out infinite}
@keyframes gold-shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}

.letter-greeting{font-size:22px;color:rgba(212,186,135,0.55);margin-bottom:28px;font-family:system-ui;font-weight:300;opacity:0}
.letter-body{font-size:20px;line-height:2.2;color:rgba(255,255,255,0.65);font-family:system-ui;letter-spacing:1.5px;min-height:80px}
.letter-body .char{opacity:0;display:inline-block;animation:char-fade 0.18s ease-out forwards}
@keyframes char-fade{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.letter-closing{font-size:22px;line-height:2;margin-top:16px;font-family:system-ui;letter-spacing:3px;opacity:0;color:var(--gold);font-weight:400}
.letter-closing .char{opacity:0;display:inline-block;animation:char-fade 0.18s ease-out forwards}
.letter-sig-area{text-align:right;margin-top:44px;min-height:90px;padding-right:8px}
.letter-sig-svg{width:260px;height:70px;display:block;margin-left:auto}
.letter-sig-svg path{stroke:var(--gold);stroke-width:2;fill:none;stroke-dasharray:500;stroke-dashoffset:500}
.letter-sig-svg path.writing{animation:draw-sig 1.5s ease-in-out forwards}
@keyframes draw-sig{to{stroke-dashoffset:0}}
.letter-sig-name{font-size:14px;color:rgba(212,186,135,0.4);letter-spacing:5px;margin-top:10px;font-family:system-ui;font-weight:300;opacity:0;text-align:right}

/* LETTER MORPH */
.letter-card.morphing{animation:letter-morph 1.8s cubic-bezier(0.4,0,0.2,1) forwards}
@keyframes letter-morph{
  0%{transform:perspective(800px) scale(1) rotateY(0);opacity:1;filter:brightness(1) blur(0px)}
  30%{transform:perspective(800px) scale(0.95) rotateY(2deg);opacity:0.95;filter:brightness(1.15) blur(0px)}
  60%{transform:perspective(800px) scale(0.8) rotateY(-2deg) translateY(-8px);opacity:0.7;filter:brightness(1.5) blur(2px)}
  100%{transform:perspective(800px) scale(0.5) rotateY(0) translateY(-20px);opacity:0;filter:brightness(2.5) blur(8px)}
}

/* NAMEPLATE SCENE */
#nameplateScene{z-index:999}
.np-scene{position:relative;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}

/* Color Themes */
.theme-gold{--np-primary:#d4ba87;--np-highlight:#f5e6c4;--np-shadow:#a08555;--np-text:rgba(50,38,18,0.85);--np-glow:#d4ba87;--np-text-light:rgba(80,60,30,0.65);--np-sig:rgba(80,60,30,0.4)}
.theme-silver{--np-primary:#c0c0c0;--np-highlight:#e8e8e8;--np-shadow:#909090;--np-text:rgba(30,30,40,0.85);--np-glow:#c0c0c0;--np-text-light:rgba(60,60,70,0.65);--np-sig:rgba(60,60,70,0.4)}
.theme-brown{--np-primary:#5c3a1e;--np-highlight:#8b6914;--np-shadow:#3d2b1f;--np-text:rgba(240,220,180,0.85);--np-glow:#8b6914;--np-text-light:rgba(220,200,160,0.65);--np-sig:rgba(220,200,160,0.4)}

/* Nameplate */
.nameplate{position:relative;width:520px;height:300px;border-radius:8px;z-index:999;opacity:0;transform-style:preserve-3d;perspective:1000px;margin-bottom:32px}
.nameplate.materialize{animation:nameplate-materialize 1.2s cubic-bezier(0.25,0.46,0.45,0.94) forwards}
@keyframes nameplate-materialize{
  0%{opacity:0;transform:scale(0.7);filter:brightness(2.5) blur(8px)}
  35%{opacity:0.7;transform:scale(0.95);filter:brightness(1.6) blur(3px)}
  70%{opacity:0.95;transform:scale(1.02);filter:brightness(1.1) blur(0px)}
  100%{opacity:1;transform:scale(1);filter:brightness(1) blur(0px)}
}
.nameplate .np-body{width:100%;height:100%;border:1px solid rgba(212,186,135,0.45);background:linear-gradient(145deg,var(--np-shadow) 0%,var(--np-highlight) 15%,var(--np-primary) 30%,var(--np-highlight) 45%,var(--np-shadow) 55%,var(--np-highlight) 68%,var(--np-primary) 82%,var(--np-shadow) 100%);padding:30px 38px;position:relative;overflow:hidden;box-shadow:0 12px 50px rgba(0,0,0,0.55),0 0 30px rgba(212,186,135,0.06),inset 0 1px 0 rgba(255,255,255,0.3),inset 0 -1px 0 rgba(0,0,0,0.15);transition:background 0.4s ease,box-shadow 0.4s ease}
.nameplate .np-body::before{content:'';position:absolute;inset:10px;border:1px solid rgba(255,255,255,0.18);pointer-events:none;border-radius:4px}
.nameplate .np-body::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(255,255,255,0.05),transparent 50%);pointer-events:none}
.nameplate .np-number{font-family:'Orbitron',monospace;font-size:16px;color:var(--np-text-light);letter-spacing:4px}
.nameplate .np-sig{position:absolute;top:18px;right:24px;width:120px;height:38px}
.nameplate .np-sig path{stroke:var(--np-sig);stroke-width:1.5;fill:none}
.nameplate .np-engraved-name{font-family:'Cinzel',serif;font-size:34px;color:var(--np-text);letter-spacing:5px;margin-top:28px;min-height:44px}
.nameplate .np-engraved-name .ech{display:inline-block;opacity:0}
.nameplate .np-engraved-name .ech.ved{animation:eng-ch 0.15s ease-out forwards}
@keyframes eng-ch{0%{opacity:0;transform:translateY(2px) scale(1.3)}50%{opacity:0.6;transform:translateY(0) scale(0.95)}100%{opacity:1;transform:translateY(0) scale(1)}}

/* Input Overlay */
.nameplate-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:rgba(0,0,0,0.45);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border-radius:8px;opacity:0;pointer-events:none;transition:opacity 0.5s ease;z-index:6}
.nameplate-overlay.visible{opacity:1;pointer-events:auto}
.np-overlay-title{font-size:13px;letter-spacing:6px;color:rgba(255,255,255,0.5);font-family:system-ui;font-weight:300}
.np-input{width:320px;padding:14px 24px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.15);color:#fff;font-size:22px;font-family:'Cinzel',serif;letter-spacing:4px;text-align:center;outline:none;transition:all 0.3s;border-radius:4px}
.np-input:focus{border-color:var(--np-primary);background:rgba(255,255,255,0.06)}
.np-input::placeholder{color:rgba(255,255,255,0.15);letter-spacing:3px}
.color-swatches{display:flex;gap:16px;align-items:center}
.color-swatch{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2px solid rgba(255,255,255,0.15);transition:all 0.3s;position:relative}
.color-swatch:hover{border-color:rgba(255,255,255,0.4);transform:scale(1.1)}
.color-swatch.active{border-color:rgba(255,255,255,0.9);box-shadow:0 0 12px rgba(255,255,255,0.3)}
.color-swatch.sw-gold{background:linear-gradient(135deg,#d4ba87,#f5e6c4,#a08555)}
.color-swatch.sw-silver{background:linear-gradient(135deg,#c0c0c0,#e8e8e8,#909090)}
.color-swatch.sw-brown{background:linear-gradient(135deg,#5c3a1e,#8b6914,#3d2b1f)}
.color-swatch-label{font-size:11px;color:rgba(255,255,255,0.35);font-family:system-ui;letter-spacing:2px}
.np-confirm-btn{padding:12px 44px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.7);font-size:14px;letter-spacing:6px;cursor:pointer;font-family:'Cinzel',serif;transition:all 0.3s;border-radius:4px}
.np-confirm-btn:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.35);color:#fff}
.np-confirm-btn:disabled{opacity:0.25;cursor:not-allowed}

/* Ultrasonic Knife */
.ultra-knife{position:absolute;z-index:10;pointer-events:none;opacity:0;transform:rotate(-30deg)}
.ultra-knife.vibrating{animation:ultra-vibrate 0.05s linear infinite}
@keyframes ultra-vibrate{
  0%{transform:translate(0,0) rotate(-30deg)}
  25%{transform:translate(1px,-0.5px) rotate(-30deg)}
  50%{transform:translate(-0.5px,1px) rotate(-30deg)}
  75%{transform:translate(-1px,-0.5px) rotate(-30deg)}
  100%{transform:translate(0,0) rotate(-30deg)}
}
.uk-handle{width:10px;height:36px;background:repeating-linear-gradient(0deg,#333,#444 2px,#333 4px);border-radius:3px;margin:0 auto;box-shadow:inset 1px 0 2px rgba(255,255,255,0.1),inset -1px 0 2px rgba(0,0,0,0.3)}
.uk-body{width:14px;height:8px;background:linear-gradient(90deg,#444,#666,#444);margin:0 auto;border-radius:1px;box-shadow:0 0 6px rgba(100,200,255,0.15)}
.uk-blade{width:4px;height:24px;background:linear-gradient(180deg,#bbb,#fff,#ccc);margin:0 auto;clip-path:polygon(0 0,100% 0,50% 100%);box-shadow:0 0 8px rgba(100,200,255,0.3)}
.uk-glow{position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:12px;height:12px;border-radius:50%;background:radial-gradient(circle,rgba(100,200,255,0.4),transparent);animation:uk-glow-pulse 0.2s ease-in-out infinite alternate}
@keyframes uk-glow-pulse{0%{opacity:0.5;transform:translateX(-50%) scale(0.8)}100%{opacity:1;transform:translateX(-50%) scale(1.2)}}
.vibe-particle{position:absolute;width:3px;height:3px;border-radius:50%;background:#fff;box-shadow:0 0 6px rgba(100,200,255,0.6);pointer-events:none;z-index:11;opacity:0}
.vibe-particle.go{animation:vibe-spark 0.3s ease-out forwards}
@keyframes vibe-spark{
  0%{opacity:1;transform:translate(0,0) scale(1)}
  100%{opacity:0;transform:translate(var(--vx),var(--vy)) scale(0)}
}

/* Nameplate Vibrate + Final */
.nameplate.vibrate{animation:plate-vibrate 0.5s ease-out forwards}
@keyframes plate-vibrate{
  0%{transform:rotate(0)}
  10%{transform:rotate(3deg) scale(1.01)}
  25%{transform:rotate(-2.5deg) scale(0.99)}
  40%{transform:rotate(2deg)}
  55%{transform:rotate(-1.5deg) scale(1.01)}
  70%{transform:rotate(1deg)}
  85%{transform:rotate(-0.5deg)}
  100%{transform:rotate(0) scale(1)}
}
.final-nameplate{position:relative;width:30vw;border-radius:12px;z-index:999;opacity:0;animation:final-np-appear 0.8s cubic-bezier(0.34,1.56,0.64,1) forwards}
.final-nameplate .np-body{width:100%;aspect-ratio:520/300;border:1px solid rgba(212,186,135,0.45);background:linear-gradient(145deg,var(--np-shadow) 0%,var(--np-highlight) 15%,var(--np-primary) 30%,var(--np-highlight) 45%,var(--np-shadow) 55%,var(--np-highlight) 68%,var(--np-primary) 82%,var(--np-shadow) 100%);padding:5% 7%;position:relative;overflow:hidden;box-shadow:0 16px 70px rgba(0,0,0,0.65),0 0 40px rgba(212,186,135,0.08),inset 0 1px 0 rgba(255,255,255,0.3),inset 0 -1px 0 rgba(0,0,0,0.15);border-radius:12px}
.final-nameplate .np-body::before{content:'';position:absolute;inset:4%;border:1px solid rgba(255,255,255,0.18);pointer-events:none;border-radius:8px}
.final-nameplate .np-body::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(255,255,255,0.06),transparent 50%);pointer-events:none}
.final-nameplate .np-number{font-family:'Orbitron',monospace;font-size:clamp(10px,1vw,16px);color:var(--np-text-light);letter-spacing:4px;position:absolute;top:8%;left:7%}
.final-nameplate .np-sig{position:absolute;top:8%;right:6%;width:22%;height:15%}
.final-nameplate .np-sig path{stroke:var(--np-sig);stroke-width:1.5;fill:none}
.final-nameplate .np-engraved-name{font-family:'Cinzel',serif;font-size:5.2vw;color:var(--np-text);letter-spacing:6px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);white-space:nowrap;text-align:center;text-shadow:0 1px 2px rgba(0,0,0,0.15)}
@keyframes final-np-appear{
  0%{opacity:0;transform:scale(0.5);filter:brightness(2.5) blur(10px)}
  50%{opacity:0.9;transform:scale(1.05);filter:brightness(1.3) blur(1px)}
  100%{opacity:1;transform:scale(1);filter:brightness(1) blur(0px)}
}

/* Benefits */
.np-benefits{margin-top:52px;opacity:0;transform:translateY(24px);transition:opacity 0.8s ease,transform 0.8s ease;text-align:center}
.np-benefits.show{opacity:1;transform:translateY(0)}
.np-benefits-list{list-style:none;padding:0;margin:0}
.np-benefits-item{font-size:clamp(13px,1.15vw,17px);color:rgba(212,186,135,0.8);font-family:system-ui;font-weight:300;letter-spacing:3px;margin:16px 0;padding-left:26px;position:relative;display:inline-block;text-align:left;opacity:0;transform:translateY(12px);transition:opacity 0.6s ease,transform 0.6s ease}
.np-benefits-item.show{opacity:1;transform:translateY(0)}
.np-benefits-item::before{content:'';position:absolute;left:0;top:50%;width:7px;height:7px;border-radius:50%;background:var(--gold);transform:translateY(-50%);box-shadow:0 0 12px rgba(212,186,135,0.5),0 0 24px rgba(212,186,135,0.15)}
.np-cta-btn{margin-top:36px;padding:16px 56px;border:1px solid rgba(212,186,135,0.4);background:linear-gradient(135deg,rgba(212,186,135,0.1),rgba(212,186,135,0.04),rgba(212,186,135,0.08));color:var(--gold);font-size:clamp(13px,1.15vw,17px);letter-spacing:6px;cursor:pointer;font-family:'Cinzel',serif;border-radius:4px;opacity:0;transform:translateY(16px);transition:opacity 0.6s ease,transform 0.6s ease,background 0.4s,border-color 0.4s,box-shadow 0.4s;position:relative;overflow:hidden}
.np-cta-btn.show{opacity:1;transform:translateY(0)}
.np-cta-btn:hover{background:linear-gradient(135deg,rgba(212,186,135,0.15),rgba(212,186,135,0.06),rgba(212,186,135,0.12));border-color:rgba(212,186,135,0.6);box-shadow:0 0 30px rgba(212,186,135,0.2),0 0 60px rgba(212,186,135,0.06)}

/* FORM SCENE */
#formScene{z-index:1000;display:flex;align-items:center;justify-content:center}
.form-card{max-width:580px;width:85vw;max-height:85vh;overflow-y:auto;padding:48px 44px;position:relative;border:1px solid rgba(212,186,135,0.22);background:rgba(12,10,8,0.98);border-radius:4px;opacity:0;transform:translateY(30px);transition:opacity 0.6s ease,transform 0.6s ease;box-shadow:0 30px 80px rgba(0,0,0,0.5),0 0 1px rgba(212,186,135,0.3)}
.form-card.entering{opacity:1;transform:translateY(0)}
.form-card::before{content:'';position:absolute;inset:10px;border:1px solid rgba(212,186,135,0.1);pointer-events:none;border-radius:2px}
.form-card::-webkit-scrollbar{width:4px}
.form-card::-webkit-scrollbar-track{background:rgba(255,255,255,0.02)}
.form-card::-webkit-scrollbar-thumb{background:rgba(212,186,135,0.2);border-radius:2px}
.form-header{text-align:center;margin-bottom:36px;padding-bottom:24px;border-bottom:1px solid rgba(212,186,135,0.08)}

var curType='',timers=[],W=800,H=600,ctx=null,particles=[],pAnimId=null;

function initC(){var c=document.getElementById('particleCanvas'),s=document.getElementById('stage');W=s.clientWidth;H=s.clientHeight;c.width=W;c.height=H;ctx=c.getContext('2d')}
initC();window.addEventListener('resize',initC);

function Particle(x,y,color,vx,vy,life,size){this.x=x;this.y=y;this.color=color;this.vx=vx;this.vy=vy;this.life=life;this.maxLife=life;this.size=size||2.5;this.friction=0.98;this.gravity=0.02}
Particle.prototype.update=function(){this.vx*=this.friction;this.vy*=this.friction;this.vy+=this.gravity;this.x+=this.vx;this.y+=this.vy;this.life--};
Particle.prototype.draw=function(c){var a=this.life/this.maxLife;c.globalAlpha=a;c.fillStyle=this.color;c.shadowBlur=this.size*3;c.shadowColor=this.color;c.beginPath();c.arc(this.x,this.y,this.size,0,Math.PI*2);c.fill();c.shadowBlur=0};
function animParticles(){if(!ctx)return;ctx.clearRect(0,0,W,H);particles=particles.filter(function(p){return p.life>0});particles.forEach(function(p){p.update();p.draw(ctx)});ctx.globalAlpha=1;pAnimId=requestAnimationFrame(animParticles)}
animParticles();

function spawnGold(cx,cy,n,spread){var colors=['#d4ba87','#e8d5b0','#f5e6c4','#c9a96e'];for(var i=0;i<n;i++){var a=Math.random()*Math.PI*2,sp=Math.random()*spread;particles.push(new Particle(cx,cy,colors[Math.floor(Math.random()*colors.length)],Math.cos(a)*sp,Math.sin(a)*sp,80+Math.random()*60,1.5+Math.random()*3.5))}}
function spawnColor(cx,cy,n,color,spread){for(var i=0;i<n;i++){var a=Math.random()*Math.PI*2,sp=Math.random()*spread;particles.push(new Particle(cx,cy,color,Math.cos(a)*sp,Math.sin(a)*sp,60+Math.random()*50,1.5+Math.random()*3))}}

function T(fn,ms){var t=setTimeout(fn,ms);timers.push(t);return t}
function clearTimers(){timers.forEach(clearTimeout);timers=[]}
function showA(id){document.querySelectorAll('.act').forEach(function(a){a.classList.remove('active')});var el=document.getElementById(id);if(el)el.classList.add('active')}

    knife.style.opacity='1';
    knife.style.transition='left 0.3s ease-out, top 0.3s ease-out';
    knife.style.left='15%';
    knife.style.top='55%';
    knife.classList.add('vibrating');
  },300);

  // Engrave characters one by one
  T(function(){
    var chars=name.split('');
    var charWidth=40;
    var startX=15;

    chars.forEach(function(ch,i){
      T(function(){
        // Add character
        var span=document.createElement('span');span.className='ech';span.textContent=ch;
        requestAnimationFrame(function(){span.classList.add('ved')});
        engNameEl.appendChild(span);

        // Move knife
        knife.style.left=(startX+i*(charWidth/5))+'%';
        knife.style.transition='left 0.12s ease-out';

        // Spawn vibe particles
        var knifeRect=knife.getBoundingClientRect();
        var npRect=np.getBoundingClientRect();
        for(var p=0;p<3;p++){
          var vp=document.createElement('div');vp.className='vibe-particle';
          var vx=(Math.random()*20-10)+'px';
          var vy=(-Math.random()*15-5)+'px';
          vp.style.cssText='left:'+(knifeRect.left-npRect.left+5)+'px;top:'+(knifeRect.top-npRect.top+40)+'px;--vx:'+vx+';--vy:'+vy;
          npBody.appendChild(vp);
          requestAnimationFrame(function(){vp.classList.add('go')});
          (function(el){setTimeout(function(){el.remove()},400)})(vp);
        }

        // Sound
        playEngraveTick();

        // Canvas particles
        spawnColor(W/2-60+i*charWidth,H*0.42+40,3,'#fff',1.5);
      },i*280);
    });

    // After all chars, knife retracts — engraving complete
    var engraveEnd=chars.length*280+200;
    T(function(){
      knife.classList.remove('vibrating');
      knife.style.transform='rotate(-30deg) translateY(-40px)';
      knife.style.opacity='0';
      knife.style.transition='all 0.4s ease-out';
      setTimeout(function(){knife.remove()},500);
    },engraveEnd);

    // Nameplate vibrates
    T(function(){
      np.classList.add('vibrate');
      fireFX(false);
      spawnColor(W/2,H*0.42,20,getThemeGlow(),3);
    },engraveEnd+500);

    // Final nameplate appears centered
    T(function(){
      np.classList.remove('vibrate');
      np.style.transition='opacity 0.3s ease';
      np.style.opacity='0';

      T(function(){
        np.style.display='none';

        var finalNp=document.createElement('div');
        finalNp.className='final-nameplate theme-'+plateTheme;
        finalNp.innerHTML='<div class="np-body">'+
          '<div class="np-number">NO.'+d.seq+'</div>'+
          '<svg class="np-sig" viewBox="0 0 200 60"><path d="'+d.sigPath+'" stroke="var(--np-sig)" stroke-width="1.5" fill="none"/></svg>'+
          '<div class="np-engraved-name">'+name+'</div>'+
        '</div>';
        wrap.appendChild(finalNp);

        // Benefits section
        var benefits=document.createElement('div');
        benefits.className='np-benefits';
        benefits.innerHTML=
          '<ul class="np-benefits-list">'+
            '<li class="np-benefits-item">专属工程师远程调试开启服务</li>'+
            '<li class="np-benefits-item">专属1v1管家随时响应答疑</li>'+
            '<li class="np-benefits-item">专属大R会员群沟通交流</li>'+
          '</ul>'+
          '<button class="np-cta-btn">开启专属调试服务</button>';
        wrap.appendChild(benefits);

        prog(100);
        fireFX(false);
        spawnGold(W/2,H/2,40,4);
        spawnColor(W/2,H/2,20,getThemeGlow(),3);

        // Staggered fade-in
        requestAnimationFrame(function(){
          setTimeout(function(){
            benefits.classList.add('show');
            var items=benefits.querySelectorAll('.np-benefits-item');
            items.forEach(function(item,i){
              setTimeout(function(){item.classList.add('show')},i*250);
            });
            setTimeout(function(){
              var btn=benefits.querySelector('.np-cta-btn');
              if(btn){
                btn.classList.add('show');
                btn.addEventListener('click',function(){
                  showA('formScene');buildFormScene();spawnGold(W/2,H/2,30,3);
                });
              }
            },items.length*250+300);
          },600);
        });
      },350);
    },engraveEnd+1100);

  },900);
}

/* FORM SCENE */
var formContactType=null,formDate=null,formTime=null;

function buildFormScene(){
  formContactType=null;formDate=null;formTime=null;
  var scene=document.getElementById('formScene');
  scene.innerHTML='';

  var card=document.createElement('div');card.className='form-card';
  card.innerHTML=
    '<div class="form-header">'+
      '<div class="form-title">开启专属调试服务</div>'+
      '<div class="form-subtitle">请填写以下信息，我们将尽快为您安排</div>'+
    '</div>'+
    '<div class="form-body">'+
      '<div class="form-group" data-idx="0">'+
        '<label class="form-label">手机号码</label>'+
        '<input class="form-input" id="formPhone" type="tel" placeholder="请输入11位手机号" maxlength="11">'+
      '</div>'+
      '<div class="form-group" data-idx="1">'+
        '<label class="form-label">所在地区</label>'+
        '<div class="form-row">'+
          '<select class="form-select" id="formProvince"><option value="" disabled selected>省/直辖市</option></select>'+
          '<select class="form-select" id="formCity" disabled><option value="" disabled selected>市</option></select>'+
          '<select class="form-select" id="formDistrict" disabled><option value="" disabled selected>区</option></select>'+
        '</div>'+
      '</div>'+
      '<div class="form-group" data-idx="2">'+
        '<label class="form-label">联系方式</label>'+
        '<div class="contact-toggle">'+
          '<button class="contact-toggle-btn" id="toggleQQ" type="button">QQ</button>'+
          '<button class="contact-toggle-btn" id="toggleWechat" type="button">微信</button>'+
        '</div>'+
        '<div class="contact-input-wrap" id="contactInputWrap">'+
          '<input class="form-input" id="formContactId" type="text" placeholder="请选择联系方式">'+
        '</div>'+
      '</div>'+
      '<div class="form-group" data-idx="3">'+
        '<label class="form-label">期望调试日期</label>'+
        '<div class="date-picker" id="datePicker"></div>'+
      '</div>'+
      '<div class="form-group" data-idx="4">'+
        '<label class="form-label">期望调试时段</label>'+
        '<div class="time-picker" id="timePicker"></div>'+
      '</div>'+
    '</div>'+
    '<div class="form-footer">'+
      '<button class="form-submit-btn" id="formSubmitBtn" disabled type="button">提交预约</button>'+
    '</div>';
  scene.appendChild(card);

  // Populate provinces
  var provSel=document.getElementById('formProvince');
  var citySel=document.getElementById('formCity');
  var distSel=document.getElementById('formDistrict');
  Object.keys(REGION_DATA).forEach(function(p){
    var opt=document.createElement('option');opt.value=p;opt.textContent=p;provSel.appendChild(opt);
  });

  // Province -> City cascade
  provSel.addEventListener('change',function(){
    citySel.innerHTML='<option value="" disabled selected>市</option>';
    distSel.innerHTML='<option value="" disabled selected>区</option>';
    distSel.disabled=true;
    var cities=REGION_DATA[provSel.value];
    if(cities){Object.keys(cities).forEach(function(c){var opt=document.createElement('option');opt.value=c;opt.textContent=c;citySel.appendChild(opt)});citySel.disabled=false}
    else{citySel.disabled=true}
    validateForm();
  });
  citySel.addEventListener('change',function(){
    distSel.innerHTML='<option value="" disabled selected>区</option>';
    var districts=REGION_DATA[provSel.value]&&REGION_DATA[provSel.value][citySel.value];
    if(districts){districts.forEach(function(d){var opt=document.createElement('option');opt.value=d;opt.textContent=d;distSel.appendChild(opt)});distSel.disabled=false}
    else{distSel.disabled=true}
    validateForm();
  });
  distSel.addEventListener('change',function(){validateForm()});

  // Phone validation
  var phone=document.getElementById('formPhone');
  phone.addEventListener('input',function(){phone.classList.remove('error');validateForm()});
  phone.addEventListener('blur',function(){if(phone.value.trim()&&!/^1[3-9]\d{9}$/.test(phone.value.trim()))phone.classList.add('error')});

  // Contact toggle
  var qqBtn=document.getElementById('toggleQQ');
  var wechatBtn=document.getElementById('toggleWechat');
  var contactWrap=document.getElementById('contactInputWrap');
  var contactInput=document.getElementById('formContactId');
  qqBtn.addEventListener('click',function(){
    formContactType='qq';qqBtn.classList.add('active');wechatBtn.classList.remove('active');
    contactWrap.classList.add('visible');contactInput.placeholder='请输入QQ号';contactInput.value='';validateForm();
  });
  wechatBtn.addEventListener('click',function(){
    formContactType='wechat';wechatBtn.classList.add('active');qqBtn.classList.remove('active');
    contactWrap.classList.add('visible');contactInput.placeholder='请输入微信号';contactInput.value='';validateForm();
  });
  contactInput.addEventListener('input',function(){validateForm()});

  // Date picker (next 14 days starting tomorrow)
  var dp=document.getElementById('datePicker');
  var weekdays=['周日','周一','周二','周三','周四','周五','周六'];
  var today=new Date();
  for(var i=1;i<=14;i++){
    (function(idx){
      var d=new Date(today);d.setDate(today.getDate()+idx);
      var btn=document.createElement('button');btn.className='date-btn';btn.type='button';
      var m=d.getMonth()+1,day=d.getDate();
      btn.innerHTML='<span>'+(m<10?'0':'')+m+'/'+(day<10?'0':'')+day+'</span><span class="d-week">'+weekdays[d.getDay()]+'</span>';
      var dateStr=d.getFullYear()+'-'+(m<10?'0':'')+m+'-'+(day<10?'0':'')+day;
      btn.setAttribute('data-date',dateStr);
      btn.addEventListener('click',function(){
        dp.querySelectorAll('.date-btn').forEach(function(b){b.classList.remove('active')});
        btn.classList.add('active');formDate=dateStr;validateForm();
      });
      dp.appendChild(btn);
    })(i);
  }

  // Time picker (09:00 - 20:30, half-hour slots)
  var tp=document.getElementById('timePicker');
  for(var h=9;h<=20;h++){
    for(var mi=0;mi<60;mi+=30){
      (function(hour,minute){
        var slot=(hour<10?'0':'')+hour+':'+(minute<10?'0':'')+minute;
        var btn=document.createElement('button');btn.className='time-btn';btn.type='button';btn.textContent=slot;
        btn.setAttribute('data-time',slot);
        btn.addEventListener('click',function(){
          tp.querySelectorAll('.time-btn').forEach(function(b){b.classList.remove('active')});
          btn.classList.add('active');formTime=slot;validateForm();
        });
        tp.appendChild(btn);
      })(h,mi);
    }
  }

  // Submit handler
  document.getElementById('formSubmitBtn').addEventListener('click',function(){
    var btn=this;btn.disabled=true;btn.textContent='提交中...';
    T(function(){
      var data=collectFormData();
      showA('successScene');buildSuccessScene(data);
      spawnGold(W/2,H/2,60,5);fireFX(false);
    },800);
  });

  // Entry animation
  requestAnimationFrame(function(){
    setTimeout(function(){
      card.classList.add('entering');
      var groups=card.querySelectorAll('.form-group');
      groups.forEach(function(g,i){setTimeout(function(){g.classList.add('show')},200+i*120)});
    },50);
  });
}

function validateForm(){
  var phone=document.getElementById('formPhone');
  var phoneOk=phone&&/^1[3-9]\d{9}$/.test(phone.value.trim());
  var prov=document.getElementById('formProvince');
  var city=document.getElementById('formCity');
  var dist=document.getElementById('formDistrict');
  var regionOk=prov&&prov.value&&city&&city.value&&dist&&dist.value;
  var contactOk=formContactType&&document.getElementById('formContactId')&&document.getElementById('formContactId').value.trim().length>0;
  var allOk=phoneOk&&regionOk&&contactOk&&formDate&&formTime;
  var btn=document.getElementById('formSubmitBtn');
  if(btn)btn.disabled=!allOk;
}

function collectFormData(){
  var phone=document.getElementById('formPhone');
  var prov=document.getElementById('formProvince');
  var city=document.getElementById('formCity');
  var dist=document.getElementById('formDistrict');
  var contactId=document.getElementById('formContactId');
  return{
    phone:phone?phone.value.trim():'',
    region:(prov?prov.value:'')+' '+(city?city.value:'')+' '+(dist?dist.value:''),
    contactType:formContactType==='qq'?'QQ':'微信',
    contactId:contactId?contactId.value.trim():'',
    date:formDate||'',
    time:formTime||''
  };
}

function buildSuccessScene(data){
  var scene=document.getElementById('successScene');
  scene.innerHTML='';
  var card=document.createElement('div');card.className='success-card';
  card.innerHTML=
    '<div class="success-icon">✦</div>'+
    '<div class="success-title">预约提交成功</div>'+
    '<div class="success-message">您的专属调试工程师将在预约时间前与您联系</div>'+
    '<div class="success-details">'+
      '<div class="detail-row"><span class="dr-label">手机号码</span><span class="dr-value">'+data.phone+'</span></div>'+
      '<div class="detail-row"><span class="dr-label">所在地区</span><span class="dr-value">'+data.region+'</span></div>'+
      '<div class="detail-row"><span class="dr-label">联系方式</span><span class="dr-value">'+data.contactType+' '+data.contactId+'</span></div>'+
      '<div class="detail-row"><span class="dr-label">调试时间</span><span class="dr-value">'+data.date+' '+data.time+'</span></div>'+
    '</div>'+
    '<div class="success-note">请保持手机畅通，我们将准时与您联系</div>'+
    '<button class="success-back-btn" id="successBackBtn" type="button">返回首页</button>';
  scene.appendChild(card);

  document.getElementById('successBackBtn').addEventListener('click',function(){showSelector()});

  requestAnimationFrame(function(){
    setTimeout(function(){
      card.classList.add('entering');
      var rows=card.querySelectorAll('.detail-row');
      rows.forEach(function(r,i){setTimeout(function(){r.classList.add('show')},300+i*150)});
    },50);
  });
}

</script>
</body>
</html>
